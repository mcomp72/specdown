<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecDown: A Markdown Viewer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">

    <!-- Local Dependencies -->
    <script src="vendor/marked.min.js"></script>
    <script src="vendor/mermaid.min.js"></script>
    <script src="vendor/panzoom.min.js"></script>
    <script src="vendor/highlight.min.js"></script>
    <script src="vendor/languages/javascript.min.js"></script>
    <script src="vendor/languages/python.min.js"></script>
    <script src="vendor/languages/java.min.js"></script>
    <script src="vendor/languages/bash.min.js"></script>
    <script src="vendor/languages/json.min.js"></script>
    <script src="vendor/languages/yaml.min.js"></script>
    <link rel="stylesheet" href="vendor/github-dark.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <a href="." class="logo-link" title="SpecDown: A Markdown Viewer">
                    <img src="logo.svg" alt="SpecDown" class="header-logo header-logo-light">
                    <img src="logo-dark.svg" alt="SpecDown" class="header-logo header-logo-dark">
                </a>
                <h1 style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;">SpecDown: A Markdown Viewer</h1>
                <div class="version-info">
                    <span id="version-label" class="version-label"></span>
                    <span id="version-update" class="version-update" style="display: none;"></span>
                    <a id="source-link" class="source-link" href="https://github.com/cbremer/specdown" target="_blank" rel="noopener noreferrer">Source</a>
                </div>
            </div>
            <div class="header-controls">
                <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Tab Bar (shown when one or more files are open) -->
        <div id="tab-bar" class="tab-bar" style="display: none;"></div>

        <!-- Drop Zone (shown when no file is loaded) -->
        <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-content">
                <svg class="drop-zone-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <h2>Drop Markdown File Here</h2>
                <p>or click to browse</p>
                <input type="file" id="file-input" accept=".md,.markdown" multiple hidden>
                <button id="browse-button" class="browse-button">Browse Files</button>
            </div>
            <div class="drop-zone-overlay">
                <p>Drop file to open</p>
            </div>
        </div>

        <!-- Content Area (shown when file is loaded) -->
        <div id="content-area" class="content-area" style="display: none;">
            <div class="content-header">
                <div class="file-info">
                    <span class="file-icon">📄</span>
                    <span id="file-name" class="file-name"></span>
                </div>
                <div class="content-header-actions">
                    <button id="watch-toggle" class="watch-toggle-button" title="Auto-reload when file changes on disk" style="display: none;">
                        <span class="watch-toggle-icon">⟳</span>
                        <span class="watch-toggle-label">Watch</span>
                    </button>
                    <button id="view-toggle" class="view-toggle-button" title="Toggle between preview and raw markdown">
                        <span class="view-toggle-icon">&lt;/&gt;</span>
                        <span class="view-toggle-label">Raw</span>
                    </button>
                </div>
            </div>
            <div id="markdown-content" class="markdown-content"></div>
        </div>

        <!-- Fullscreen Overlay -->
        <div id="fullscreen-overlay" class="fullscreen-overlay" style="display: none;">
            <div class="fullscreen-content">
                <div class="fullscreen-controls">
                    <button class="zoom-in" title="Zoom in">+</button>
                    <button class="zoom-out" title="Zoom out">-</button>
                    <button class="reset" title="Reset view">⟲</button>
                    <button class="close-fullscreen" title="Exit fullscreen (ESC)">✕</button>
                </div>
                <div class="fullscreen-diagram-wrapper"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
