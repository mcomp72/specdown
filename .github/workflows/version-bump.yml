name: Bump version on merge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # bump: commits a version bump directly to main when new code lands.
  # Uses ADMIN_PAT so the push is from a repo admin, bypassing branch
  # protection. The [version bump] marker prevents infinite loops.
  # For pull_request events it is a no-op so the required "bump"
  # status check passes on every PR.
  # -----------------------------------------------------------------
  bump:
    runs-on: ubuntu-latest

    # For push: only run if NOT a version bump commit (prevents infinite loop)
    # For PR: always run (provides the required "bump" status check)
    if: >-
      github.event_name == 'pull_request' ||
      !contains(github.event.head_commit.message, '[version bump]')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          token: ${{ secrets.ADMIN_PAT }}

      - uses: actions/setup-node@v4
        if: github.event_name == 'push'
        with:
          node-version: 20

      - name: Configure git
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        if: github.event_name == 'push'
        run: npm version patch --no-git-tag-version

      - name: Commit and push version bump to main
        if: github.event_name == 'push'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add package.json markdown-viewer/app.js README.md
          git commit -m "Bump version to v${VERSION} [version bump]"
          git push origin main

  # -----------------------------------------------------------------
  # tag: after a version-bump commit lands on main, create the
  # version tag, then explicitly trigger the desktop build and
  # static deploy workflows.
  #
  # Why explicit triggers? Tags pushed with GITHUB_TOKEN do NOT fire
  # push-tag events for other workflows (GitHub prevents this to
  # avoid infinite loops). Using gh workflow run (workflow_dispatch)
  # works with GITHUB_TOKEN and gives us precise control.
  # -----------------------------------------------------------------
  tag:
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, '[version bump]')

    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If the tag already exists (e.g. from a previous failed run),
          # delete it so we can recreate it on the correct commit.
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "::warning::Tag ${TAG} already exists on remote — replacing it"
            git push origin --delete "${TAG}" 2>/dev/null || true
          fi

          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

      - name: Trigger desktop build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run desktop.yml --ref main

      - name: Trigger static deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run static.yml --ref main
